<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <!-- CRT screen glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fff7f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2d5a2d" stop-opacity="0.9"/>
    </radialGradient>
    <!-- CRT scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <!-- Body shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#2a1a0a" flood-opacity="0.3"/>
    </filter>
    <!-- Screen flicker -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Leather texture gradient -->
    <linearGradient id="jacketGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#7A4F30"/>
      <stop offset="100%" stop-color="#6B422A"/>
    </linearGradient>
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B422A"/>
      <stop offset="100%" stop-color="#5A3520"/>
    </linearGradient>
    <linearGradient id="bootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A2C1A"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </linearGradient>
  </defs>

  <!-- === BODY === -->
  <g filter="url(#softShadow)">

    <!-- Legs -->
    <!-- Left leg -->
    <rect x="155" y="340" width="38" height="90" rx="8" fill="url(#pantsGrad)"/>
    <!-- Right leg -->
    <rect x="207" y="340" width="38" height="90" rx="8" fill="url(#pantsGrad)"/>
    <!-- Knee patches -->
    <ellipse cx="174" cy="380" rx="14" ry="10" fill="#5A3520" opacity="0.6"/>
    <ellipse cx="226" cy="380" rx="14" ry="10" fill="#5A3520" opacity="0.6"/>

    <!-- Boots -->
    <!-- Left boot -->
    <path d="M148 420 Q148 445 155 450 L185 450 Q198 450 198 435 L198 420 Z" fill="url(#bootGrad)"/>
    <rect x="148" y="418" width="50" height="8" rx="3" fill="#5A3520"/>
    <!-- boot strap -->
    <rect x="152" y="430" width="42" height="3" rx="1" fill="#3A2010"/>
    <!-- Right boot -->
    <path d="M202 420 Q202 445 209 450 L239 450 Q252 450 252 435 L252 420 Z" fill="url(#bootGrad)"/>
    <rect x="202" y="418" width="50" height="8" rx="3" fill="#5A3520"/>
    <rect x="206" y="430" width="42" height="3" rx="1" fill="#3A2010"/>
    <!-- Boot soles -->
    <rect x="148" y="447" width="50" height="6" rx="2" fill="#2A1A0A"/>
    <rect x="202" y="447" width="50" height="6" rx="2" fill="#2A1A0A"/>

    <!-- Torso / Jacket -->
    <path d="M150 195 Q145 220 148 340 L252 340 Q255 220 250 195 Z" fill="url(#jacketGrad)" stroke="#5A3520" stroke-width="1.5"/>
    <!-- Jacket center line -->
    <line x1="200" y1="200" x2="200" y2="335" stroke="#5A3520" stroke-width="2"/>
    <!-- Jacket collar -->
    <path d="M165 195 Q175 210 200 215 Q225 210 235 195" fill="none" stroke="#5A3520" stroke-width="2"/>
    <!-- Belt -->
    <rect x="148" y="310" width="104" height="12" rx="3" fill="#4A2C1A"/>
    <rect x="190" y="308" width="20" height="16" rx="3" fill="#B8860B" stroke="#8B6914" stroke-width="1"/>
    <!-- Belt pouches -->
    <rect x="152" y="300" width="18" height="14" rx="3" fill="#5A3520" stroke="#4A2C1A" stroke-width="1"/>
    <rect x="230" y="300" width="18" height="14" rx="3" fill="#5A3520" stroke="#4A2C1A" stroke-width="1"/>
    <!-- Jacket pockets -->
    <rect x="158" y="245" width="30" height="22" rx="4" fill="none" stroke="#5A3520" stroke-width="1.5"/>
    <line x1="158" y1="252" x2="188" y2="252" stroke="#5A3520" stroke-width="1.5"/>
    <rect x="212" y="245" width="30" height="22" rx="4" fill="none" stroke="#5A3520" stroke-width="1.5"/>
    <line x1="212" y1="252" x2="242" y2="252" stroke="#5A3520" stroke-width="1.5"/>
    <!-- Shoulder pads -->
    <ellipse cx="148" cy="210" rx="18" ry="12" fill="#7A4F30" stroke="#5A3520" stroke-width="1"/>
    <ellipse cx="252" cy="210" rx="18" ry="12" fill="#7A4F30" stroke="#5A3520" stroke-width="1"/>

    <!-- Arms -->
    <!-- Left arm -->
    <path d="M130 210 Q120 260 105 310 Q102 320 108 322 L125 325 Q132 326 133 316 L148 260" fill="url(#jacketGrad)" stroke="#5A3520" stroke-width="1.5"/>
    <!-- Left glove -->
    <path d="M100 310 Q95 325 98 335 Q100 342 110 340 L125 335 Q135 332 133 318 L125 325 Z" fill="#3A2010"/>
    <!-- Right arm -->
    <path d="M270 210 Q280 260 290 300 Q292 310 288 312 L272 318 Q265 320 264 310 L252 260" fill="url(#jacketGrad)" stroke="#5A3520" stroke-width="1.5"/>
    <!-- Right glove -->
    <path d="M285 298 Q292 310 295 322 Q296 332 288 332 L272 328 Q262 325 264 312 L272 318 Z" fill="#3A2010"/>

    <!-- Left hand holding device -->
    <g transform="translate(78, 310)">
      <rect x="0" y="0" width="28" height="38" rx="4" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="1.5"/>
      <rect x="3" y="3" width="22" height="16" rx="2" fill="#1a3a1a"/>
      <rect x="3" y="3" width="22" height="16" rx="2" fill="url(#screenGlow)" opacity="0.7"/>
      <!-- Mini screen content -->
      <text x="14" y="14" text-anchor="middle" font-size="7" fill="#7fff7f" font-family="monospace">:)</text>
      <!-- Buttons -->
      <circle cx="8" cy="26" r="2.5" fill="#c0392b"/>
      <circle cx="16" cy="26" r="2.5" fill="#27ae60"/>
      <rect x="8" y="32" width="12" height="3" rx="1" fill="#555"/>
    </g>

    <!-- Right hand holding toolbox -->
    <g transform="translate(278, 298)">
      <rect x="0" y="5" width="42" height="28" rx="4" fill="#5A6A5A" stroke="#4A5A4A" stroke-width="1.5"/>
      <!-- Toolbox handle -->
      <path d="M12 5 L12 0 Q12 -4 21 -4 Q30 -4 30 0 L30 5" fill="none" stroke="#4A5A4A" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Toolbox latch -->
      <rect x="17" y="16" width="8" height="5" rx="1" fill="#B8860B"/>
      <!-- Toolbox stickers -->
      <rect x="3" y="8" width="8" height="6" rx="1" fill="#c0392b" opacity="0.8"/>
      <rect x="31" y="8" width="8" height="6" rx="1" fill="#2980b9" opacity="0.8"/>
      <rect x="3" y="23" width="8" height="6" rx="1" fill="#f39c12" opacity="0.8"/>
    </g>

    <!-- Neck -->
    <rect x="185" y="170" width="30" height="30" rx="5" fill="#6B422A"/>

    <!-- === CRT HEAD === -->
    <g transform="translate(200, 100)">
      <!-- CRT body -->
      <rect x="-55" y="-70" width="110" height="100" rx="12" fill="#7A7A72" stroke="#5A5A52" stroke-width="2.5"/>
      <!-- CRT inner bezel -->
      <rect x="-48" y="-63" width="96" height="86" rx="8" fill="#5A5A52"/>
      <!-- Screen -->
      <rect x="-42" y="-57" width="84" height="74" rx="6" fill="#1a3a1a"/>
      <rect x="-42" y="-57" width="84" height="74" rx="6" fill="url(#screenGlow)"/>
      <!-- Scanlines -->
      <rect x="-42" y="-57" width="84" height="74" rx="6" fill="url(#scanlines)"/>

      <!-- Cute face on screen -->
      <g filter="url(#glow)">
        <!-- Eyes - happy curved eyes -->
        <path d="M-20 -30 Q-15 -40 -10 -30" fill="none" stroke="#7fff7f" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M10 -30 Q15 -40 20 -30" fill="none" stroke="#7fff7f" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Mouth - big smile -->
        <path d="M-18 -5 Q0 15 18 -5" fill="none" stroke="#7fff7f" stroke-width="3" stroke-linecap="round"/>
        <!-- Rosy cheeks -->
        <circle cx="-25" cy="-10" r="6" fill="#7fff7f" opacity="0.15"/>
        <circle cx="25" cy="-10" r="6" fill="#7fff7f" opacity="0.15"/>
      </g>

      <!-- CRT top details -->
      <!-- Antenna left -->
      <line x1="-30" y1="-70" x2="-45" y2="-100" stroke="#5A5A52" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-45" cy="-102" r="4" fill="#c0392b"/>
      <!-- Antenna right -->
      <line x1="30" y1="-70" x2="40" y2="-95" stroke="#5A5A52" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="-97" r="4" fill="#27ae60"/>

      <!-- Side knobs -->
      <circle cx="60" cy="-40" r="6" fill="#5A5A52" stroke="#4A4A42" stroke-width="1.5"/>
      <circle cx="60" cy="-40" r="3" fill="#4A4A42"/>
      <circle cx="60" cy="-20" r="5" fill="#5A5A52" stroke="#4A4A42" stroke-width="1.5"/>
      <circle cx="60" cy="-20" r="2.5" fill="#4A4A42"/>

      <!-- Cables from back of head -->
      <path d="M45 -50 Q65 -45 70 -30 Q75 -10 65 10" fill="none" stroke="#4A4A42" stroke-width="3" stroke-linecap="round"/>
      <path d="M-45 -45 Q-60 -30 -55 0 Q-50 20 -45 30" fill="none" stroke="#4A4A42" stroke-width="2.5" stroke-linecap="round"/>

      <!-- CRT brand label -->
      <rect x="-15" y="22" width="30" height="8" rx="2" fill="#6A6A62"/>
      <text x="0" y="29" text-anchor="middle" font-size="6" fill="#888" font-family="monospace" font-weight="bold">MUTE</text>
    </g>

    <!-- Backpack straps visible -->
    <line x1="165" y1="200" x2="160" y2="260" stroke="#4A2C1A" stroke-width="4" stroke-linecap="round"/>
    <line x1="235" y1="200" x2="240" y2="260" stroke="#4A2C1A" stroke-width="4" stroke-linecap="round"/>

    <!-- Arm band / patches -->
    <rect x="120" y="240" width="15" height="8" rx="2" fill="#c0392b" opacity="0.8"/>
    <rect x="265" y="240" width="15" height="8" rx="2" fill="#2980b9" opacity="0.8"/>

  </g>

  <!-- Subtle ground shadow -->
  <ellipse cx="200" cy="456" rx="80" ry="8" fill="#2a1a0a" opacity="0.15"/>
</svg>